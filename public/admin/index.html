<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EGDA News Editor</title>
    <base href="/admin/">
  </head>
  <body>
    <script>
      // Re-dispatch BroadcastChannel auth messages as window message events
      // so Decap CMS's internal listener receives them (needed because GitHub's
      // COOP header severs window.opener in the OAuth popup).
      var _authChannel = new BroadcastChannel('decap_cms_auth');
      _authChannel.onmessage = function(e) {
        console.log('[CMS-AUTH] BroadcastChannel received:', e.data);
        window.dispatchEvent(new MessageEvent('message', {
          data: e.data,
          origin: window.location.origin,
        }));
      };
    </script>
    <script src="https://unpkg.com/decap-cms@3.0.4/dist/decap-cms.js"></script>
  </body>
</html>
